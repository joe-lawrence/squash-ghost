<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squash Ghosting Workout Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gray-850': '#1f2937',
                    }
                }
            }
        }
    </script>
    <style>
        .slider-thumb::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        .slider-thumb::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Squash Ghosting Workout Generator</h1>
            <p class="text-gray-600">Create and configure your ghosting workout patterns</p>
        </header>

        <div class="mb-6 flex gap-4">
            <button id="addMessageBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md">
                Add Message
            </button>
            <button id="addShotBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md">
                Add Shot
            </button>
            <button id="exportBtn" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-md ml-auto">
                Export JSON
            </button>
        </div>

        <div id="entriesContainer" class="space-y-4">
            <!-- Entries will be dynamically added here -->
        </div>

        <div id="noEntries" class="text-center text-gray-500 py-12">
            <p class="text-lg">No entries yet. Add a message or shot to get started.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
